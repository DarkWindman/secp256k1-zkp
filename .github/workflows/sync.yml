name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      UPSTREAM: "https://github.com/BlockstreamResearch/secp256k1-zkp.git" 
      UPSTREAM_MASTER: "master"
      LOCAL_BRANCH: "master"
      SYNC_BRANCH: "automated-upstream-sync"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ДОДАНО: використовуємо наш новий токен з правами workflow
          token: ${{ secrets.SYNC_PAT }} 

      - name: Check for Existing Open PR
        id: check_pr
        env:
          # ДОДАНО: використовуємо новий токен для GitHub CLI
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          PR_COUNT=$(gh pr list --head ${{ env.SYNC_BRANCH }} --state open --json number --jq 'length')
          
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "A sync PR is already open. Skipping creation of a new one."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No open sync PR found. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git Identity
        if: steps.check_pr.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Upstream & Check Commit Threshold
        id: check_commits
        if: steps.check_pr.outputs.skip == 'false'
        run: |
          git remote add upstream ${{ env.UPSTREAM }}
          git fetch upstream
          
          NEW_COMMITS=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_MASTER }})
          echo "Found $NEW_COMMITS new commits in upstream."
          
          if [ "$NEW_COMMITS" -lt 10 ]; then
            echo "Threshold not met (requires 10). Exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Threshold met! Proceeding with sync."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PR Title and Body
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        run: |
          COMMITS=$(git --no-pager log --oneline --merges HEAD..upstream/${{ env.UPSTREAM_MASTER }} | tac | awk '{ print $1 }')

          TITLE="Upstream PRs"
          BODY=""

          for COMMIT in $COMMITS
          do
              PRNUM=$(git log -1 "$COMMIT" --pretty=format:%s | sed -E 's/^Merge [^#]*#([0-9]+).*/\1/')
              TITLE="$TITLE $PRNUM,"
              
              FORMATTED_MSG=$(git log -1 "$COMMIT" --pretty=format:%s | sed -E 's/^Merge ([^#]+)#([0-9]+)/[\1#\2]/')
              BODY=$(printf "%s\n%s" "$BODY" "$FORMATTED_MSG")
          done

          TITLE=${TITLE%?}

          if [ ${#TITLE} -gt 250 ]; then
            TITLE="${TITLE:0:250}..."
          fi

          echo "PR_TITLE=$TITLE" >> "$GITHUB_ENV"

          EOF_MARKER=$(cat /proc/sys/kernel/random/uuid)
          echo "PR_BODY<<$EOF_MARKER" >> "$GITHUB_ENV"
          echo "$BODY" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "This PR was automatically generated by GitHub Actions." >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "Tips:" >> "$GITHUB_ENV"
          echo " * Use \`git show --remerge-diff <pr-branch>\` to show the conflict resolution in the merge commit." >> "$GITHUB_ENV"
          echo " * Use \`git read-tree --reset -u <pr-branch>\` to replay these resolutions during the conflict resolution stage when recreating the PR branch locally." >> "$GITHUB_ENV"
          echo "   Be aware that this may discard your index as well as the uncommitted changes and untracked files in your worktree." >> "$GITHUB_ENV"
          echo "$EOF_MARKER" >> "$GITHUB_ENV"

      - name: Branch, Merge, and Push
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        run: |
          git checkout -B ${{ env.SYNC_BRANCH }}
          git merge upstream/${{ env.UPSTREAM_MASTER }} --no-edit || true
          git push -u origin ${{ env.SYNC_BRANCH }} --force

      - name: Create Pull Request
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        env:
          # ДОДАНО: використовуємо новий токен для створення PR
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --repo ${{ github.repository }} \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base ${{ env.LOCAL_BRANCH }} \
            --head ${{ env.SYNC_BRANCH }} \