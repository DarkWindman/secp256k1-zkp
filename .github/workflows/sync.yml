name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      UPSTREAM: "https://github.com/mllwchrry/secp256k1-zkp.git" 
      UPSTREAM_MASTER: "master"
      LOCAL_BRANCH: "master"
      SYNC_BRANCH: "automated-upstream-sync"
      MAX_BATCH_SIZE: 12  # Maximum commits per PR
      MIN_THRESHOLD: 1    # Minimum commits before creating PR
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }} 

      - name: Check for Existing Open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          PR_COUNT=$(gh pr list --head ${{ env.SYNC_BRANCH }} --state open --json number --jq 'length')
          
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "A sync PR is already open. Skipping creation of a new one."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No open sync PR found. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git Identity
        if: steps.check_pr.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Upstream & Check Commit Threshold
        id: check_commits
        if: steps.check_pr.outputs.skip == 'false'
        run: |
          git remote add upstream ${{ env.UPSTREAM }}
          git fetch upstream
          
          NEW_COMMITS=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_MASTER }})
          echo "Found $NEW_COMMITS new commits in upstream."
          
          if [ "$NEW_COMMITS" -lt 10 ]; then
            echo "Threshold not met (requires 10). Exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Threshold met! Proceeding with sync."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PR Title and Body
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        run: |
          # Get ALL merge commits (oldest first)
          ALL_COMMITS=$(git --no-pager log --oneline --merges HEAD..upstream/${{ env.UPSTREAM_MASTER }} | tac | awk '{ print $1 }')

          # Convert to array
          COMMITS_ARRAY=($ALL_COMMITS)
          TOTAL=${#COMMITS_ARRAY[@]}

          echo "Found $TOTAL total commits in upstream"

          # Check minimum threshold
          if [ $TOTAL -lt ${{ env.MIN_THRESHOLD }} ]; then
            echo "Only $TOTAL commits available. Minimum threshold is ${{ env.MIN_THRESHOLD }}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine batch size and merge target
          if [ $TOTAL -le ${{ env.MAX_BATCH_SIZE }} ]; then
            # Less than or equal to batch size - sync all
            BATCH_SIZE=$TOTAL
            COMMITS_TO_SYNC=("${COMMITS_ARRAY[@]}")
            MERGE_TARGET="upstream/${{ env.UPSTREAM_MASTER }}"
            echo "Syncing all $TOTAL commits"
          else
            # More than batch size - sync first batch only
            BATCH_SIZE=${{ env.MAX_BATCH_SIZE }}
            COMMITS_TO_SYNC=("${COMMITS_ARRAY[@]:0:$BATCH_SIZE}")
            MERGE_TARGET="${COMMITS_ARRAY[$((BATCH_SIZE-1))]}"
            echo "Batching: Syncing first $BATCH_SIZE of $TOTAL commits"
            echo "Remaining commits will be synced in subsequent PRs"
          fi

          # Build title and body
          TITLE="Upstream PRs"
          BODY=""

          for COMMIT in "${COMMITS_TO_SYNC[@]}"
          do
              PRNUM=$(git log -1 "$COMMIT" --pretty=format:%s | sed -E 's/^Merge [^#]*#([0-9]+).*/\1/')

              # Validate PR number extraction
              if [[ "$PRNUM" =~ ^[0-9]+$ ]]; then
                TITLE="$TITLE $PRNUM,"
                FORMATTED_MSG=$(git log -1 "$COMMIT" --pretty=format:%s | sed -E 's/^Merge ([^#]+)#([0-9]+)/[\1#\2]/')
                BODY=$(printf "%s\n%s" "$BODY" "$FORMATTED_MSG")
              else
                echo "Warning: Could not extract PR number from commit $COMMIT"
              fi
          done

          # Remove trailing comma
          TITLE=${TITLE%?}

          # Truncate if too long
          if [ ${#TITLE} -gt 250 ]; then
            TITLE="${TITLE:0:250}..."
          fi

          # Add batching info to body if not syncing all
          if [ $TOTAL -gt $BATCH_SIZE ]; then
            BATCHING_INFO="⚠️ **Batched sync**: This PR includes $BATCH_SIZE of $TOTAL available commits. Remaining $((TOTAL - BATCH_SIZE)) commits will be synced in subsequent PRs."
          else
            BATCHING_INFO=""
          fi

          # Store variables
          echo "MERGE_TARGET=$MERGE_TARGET" >> "$GITHUB_ENV"
          echo "PR_TITLE=$TITLE" >> "$GITHUB_ENV"

          # Generate PR body
          echo "PR_BODY<<EOF" >> "$GITHUB_ENV"
          if [ -n "$BATCHING_INFO" ]; then
            echo "$BATCHING_INFO" >> "$GITHUB_ENV"
            echo "" >> "$GITHUB_ENV"
          fi
          echo "$BODY" >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "This PR was automatically generated by GitHub Actions." >> "$GITHUB_ENV"
          echo "" >> "$GITHUB_ENV"
          echo "Tips:" >> "$GITHUB_ENV"
          echo " * Use \`git show --remerge-diff <pr-branch>\` to show the conflict resolution in the merge commit." >> "$GITHUB_ENV"
          echo " * Use \`git read-tree --reset -u <pr-branch>\` to replay these resolutions during the conflict resolution stage when recreating the PR branch locally." >> "$GITHUB_ENV"
          echo "   Be aware that this may discard your index as well as the uncommitted changes and untracked files in your worktree." >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Branch, Merge, and Push
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        run: |
          git checkout -B ${{ env.SYNC_BRANCH }}

          echo "Merging up to: ${{ env.MERGE_TARGET }}"

          if git merge ${{ env.MERGE_TARGET }} --no-edit; then
            echo "✅ Clean merge - no conflicts"
          else
            echo "⚠️ Merge has conflicts - committing conflict markers for manual resolution"
            # Add all files (including conflicts)
            git add -A
            # Commit the merge with conflicts
            git commit -m "Merge ${{ env.MERGE_TARGET }} with conflicts
      
            This merge contains conflicts that need manual resolution.
            Files with conflicts will be marked with conflict markers."
          fi
    
          git push -u origin ${{ env.SYNC_BRANCH }} --force 

      - name: Create Pull Request
        if: steps.check_pr.outputs.skip == 'false' && steps.check_commits.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --repo ${{ github.repository }} \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base ${{ env.LOCAL_BRANCH }} \
            --head ${{ env.SYNC_BRANCH }}

      #- name: Cleanup on Failure
      #  if: failure()
       # run: |
       #   git push origin --delete ${{ env.SYNC_BRANCH }} || true
       #   echo "🧹 Cleaned up failed branch"